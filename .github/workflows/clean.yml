name: Cleanup Old Images
on:
  schedule:
    - cron: "15 18 * * 2" # Runs at 18:15, only on Tuesday. 
  workflow_dispatch:

jobs:
  delete-older-than-60:
    runs-on: ubuntu-24.04-arm
    permissions:
      packages: write
    steps:
      - name: Delete Images Older Than 60 Days
        uses: dataaxiom/ghcr-cleanup-action@34a2b6c814b9c6bcb92f78cba3e56a7ab9ca7a86 # v1
        with:
          packages: caddy-image
          older-than: 60 days
          delete-orphaned-images: true
          keep-n-tagged: 7
          keep-n-untagged: 7
